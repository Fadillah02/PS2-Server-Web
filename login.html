<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login PS2 Emulator Dashboard">
    <meta name="theme-color" content="#0a0a0f">
    <title>Login — PS2 Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-page">
    <div class="login-bg"></div>
    <div class="login-box">
        <div class="login-logo"><i class="fas fa-gamepad"></i></div>
        <h2>PS2 Dashboard</h2>
        <p class="login-subtitle">Browser Emulator + PCSX2 Native</p>
        <form id="login-form">
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Password" required autofocus>
            </div>
            <p id="error" class="login-error hidden"></p>
            <button type="submit" class="btn btn-gradient btn-block">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>
        <p class="login-note">Play!.js (browser) &amp; PCSX2 portable — kelola ISO dari web dashboard.</p>
    </div>
    <script>
        const token = localStorage.getItem('ps2_token');
        if (token) fetch('/api/auth', { headers: { 'X-Auth-Token': token } }).then(r => { if (r.ok) location.href = 'index.html'; });
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const err = document.getElementById('error');
            err.classList.add('hidden');
            const res = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:document.getElementById('password').value}) });
            const data = await res.json();
            if (res.ok) { localStorage.setItem('ps2_token', data.token); location.href = 'index.html'; }
            else { err.textContent = data.error || 'Login gagal'; err.classList.remove('hidden'); }
        };
    </script>
</body>
</html>
